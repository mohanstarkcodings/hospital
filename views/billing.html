<!DOCTYPE html>
<html>

<head>

    <title>Billing</title>

    <link rel="stylesheet" href="../css/billing.css">

</head>

<body>

<div class="container">

<h2>Billing Page</h2>

<form id="billingForm">

<label>Appointment ID</label>
<input type="number" id="appointment_id" required>

<label>Consultation Fee</label>
<input type="number" id="consultation_fee" required>

<label>Lab Test Fee</label>
<input type="number" id="lab_test_fee" required>

<label>Medicine Cost</label>
<input type="number" id="medicine_cost" required>

<label>Room Charges</label>
<input type="number" id="room_charges" required>

<button type="submit">

Generate Bill

</button>

</form>

<p id="message"></p>

</div>

<script src="../javascript/billing.js"></script>

</body>

</html>
