<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>

    <link rel="stylesheet" href="../css/patientReg.css">
</head>
<body>

<div class="container">

    <h2>Patient Registration</h2>

    <form id="patientForm">

        <label>Patient Name</label>
        <input
            type="text"
            id="patient_name"
            placeholder="Enter patient name"
            required
        >

        <label>Age</label>
        <input
            type="number"
            id="age"
            min="1"
            max="120"
            required
        >

        <label>Gender</label>

        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Phone Number</label>

        <input
            type="tel"
            id="phone"
            placeholder="9876543210"
            required
        >

        <label>Address</label>

        <textarea
            id="address"
            rows="4"
            placeholder="Enter address"
            required
        ></textarea>

        <label>Blood Group</label>

        <select id="blood_group" required>

            <option value="">Select Blood Group</option>

            <option>A+</option>
            <option>A-</option>

            <option>B+</option>
            <option>B-</option>

            <option>AB+</option>
            <option>AB-</option>

            <option>O+</option>
            <option>O-</option>

        </select>

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="example@gmail.com"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p id="message"></p>

</div>

<script src="../javascript/patientReg.js"></script>

</body>
</html>
